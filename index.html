<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Flagmaster — Learn Every Flag in the World</title>
<style>
  :root {
    --bg: #0b1020;
    --panel: #131a32;
    --panel-2: #1a2247;
    --text: #e8ecf8;
    --muted: #9aa3c7;
    --accent: #7c9cff;
    --accent-2: #5be0c2;
    --good: #4ade80;
    --bad: #f87171;
    --warn: #fbbf24;
    --shadow: 0 10px 40px rgba(0,0,0,.35);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: radial-gradient(1200px 600px at 20% 0%, #1a2150 0%, var(--bg) 60%) fixed;
    color: var(--text);
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
    -webkit-font-smoothing: antialiased;
  }
  header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 18px 28px; border-bottom: 1px solid rgba(255,255,255,.06);
    background: rgba(11,16,32,.6); backdrop-filter: blur(8px);
    position: sticky; top: 0; z-index: 10;
  }
  .brand { display: flex; align-items: center; gap: 12px; font-weight: 700; letter-spacing: .3px; }
  .brand .logo {
    width: 36px; height: 24px; border-radius: 4px;
    background: linear-gradient(180deg, var(--accent), var(--accent-2));
    box-shadow: inset 0 0 0 2px rgba(255,255,255,.15);
  }
  .stats { display: flex; gap: 18px; flex-wrap: wrap; font-variant-numeric: tabular-nums; }
  .stat { background: var(--panel); padding: 8px 14px; border-radius: 10px; font-size: 14px; }
  .stat b { color: var(--accent-2); margin-left: 6px; }
  main { max-width: 1080px; margin: 0 auto; padding: 24px; }
  .modes {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 14px; margin-bottom: 22px;
  }
  .mode {
    background: var(--panel); border: 1px solid rgba(255,255,255,.06);
    padding: 16px; border-radius: 14px; cursor: pointer; transition: transform .12s ease, background .12s ease, border-color .12s ease;
  }
  .mode:hover { background: var(--panel-2); transform: translateY(-2px); }
  .mode.active { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(124,156,255,.25); }
  .mode h3 { margin: 0 0 6px; font-size: 16px; }
  .mode p { margin: 0; color: var(--muted); font-size: 13px; line-height: 1.4; }
  .controls {
    display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
    background: var(--panel); padding: 14px; border-radius: 12px; margin-bottom: 18px;
  }
  .controls label { font-size: 13px; color: var(--muted); margin-right: 4px; }
  select, button, input[type="text"] {
    background: var(--panel-2); color: var(--text); border: 1px solid rgba(255,255,255,.08);
    border-radius: 10px; padding: 9px 14px; font-size: 14px; outline: none;
    font-family: inherit;
  }
  button { cursor: pointer; transition: background .12s ease, transform .06s ease; }
  button:hover { background: #232c5e; }
  button:active { transform: translateY(1px); }
  button.primary { background: var(--accent); color: #0b1020; border: none; font-weight: 600; }
  button.primary:hover { background: #9ab2ff; }
  button.danger { background: var(--bad); color: #2a0a0a; border: none; }
  .game {
    background: var(--panel); border-radius: 18px; padding: 28px;
    box-shadow: var(--shadow); border: 1px solid rgba(255,255,255,.06);
  }
  .flag-wrap {
    display: flex; justify-content: center; align-items: center;
    background: #fff; border-radius: 14px; padding: 18px; min-height: 240px;
    box-shadow: 0 6px 24px rgba(0,0,0,.25); margin: 0 auto 18px;
    max-width: 520px;
  }
  .flag-wrap img {
    width: 100%; max-width: 460px; height: auto; border-radius: 6px;
    box-shadow: 0 2px 12px rgba(0,0,0,.2);
  }
  .prompt { text-align: center; color: var(--muted); margin: 6px 0 14px; font-size: 14px; }
  .answer-area { display: grid; gap: 10px; }
  .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .choice {
    text-align: left; padding: 14px 16px; font-size: 15px; line-height: 1.2;
    background: var(--panel-2); border: 1px solid rgba(255,255,255,.06); border-radius: 12px;
  }
  .choice:hover { background: #24306b; }
  .choice.correct { background: #14361f; border-color: var(--good); color: #b8f5cc; }
  .choice.wrong { background: #3a1313; border-color: var(--bad); color: #fbd2d2; }
  .choice.disabled { cursor: default; opacity: .85; }
  .reveal {
    text-align: center; font-size: 22px; font-weight: 700; margin: 12px 0 16px;
  }
  .reveal small { display: block; color: var(--muted); font-weight: 400; font-size: 13px; margin-top: 4px; }
  .row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .progress-bar {
    height: 6px; background: rgba(255,255,255,.06); border-radius: 999px; overflow: hidden; margin: 10px 0 18px;
  }
  .progress-bar > div { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); width: 0%; transition: width .25s ease; }
  .type-input {
    width: 100%; font-size: 16px; padding: 12px 14px; text-align: center;
  }
  .feedback { text-align: center; min-height: 24px; font-size: 14px; margin-top: 4px; }
  .feedback.good { color: var(--good); }
  .feedback.bad { color: var(--bad); }
  .timer-bar {
    height: 6px; background: rgba(255,255,255,.06); border-radius: 999px; overflow: hidden; margin: 0 0 14px;
  }
  .timer-bar > div { height: 100%; background: linear-gradient(90deg, var(--warn), var(--bad)); width: 100%; }
  .timer-text { font-variant-numeric: tabular-nums; color: var(--warn); font-weight: 700; }
  .live-ticker { font-variant-numeric: tabular-nums; color: var(--accent-2); font-weight: 700; }
  .end-screen { text-align: center; padding: 18px; }
  .end-screen h2 { margin: 6px 0; font-size: 28px; }
  .big-score { font-size: 48px; font-weight: 800; color: var(--accent-2); margin: 8px 0; }
  .muted { color: var(--muted); }
  .badge { display: inline-block; background: var(--panel-2); padding: 4px 10px; border-radius: 999px; font-size: 12px; color: var(--muted); margin: 2px; }
  .missed-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px,1fr)); gap: 10px; margin-top: 18px; text-align: left; }
  .missed { background: var(--panel-2); padding: 10px; border-radius: 10px; display: flex; gap: 10px; align-items: center; font-size: 13px; }
  .missed img { width: 36px; height: auto; border-radius: 3px; background: #fff; }
  .footer-note { text-align: center; color: var(--muted); font-size: 12px; padding: 18px; }
  .scoreboard { overflow-x: auto; margin-top: 8px; border-radius: 12px; border: 1px solid rgba(255,255,255,.06); }
  .scoreboard table { width: 100%; border-collapse: collapse; font-size: 13px; font-variant-numeric: tabular-nums; }
  .scoreboard th, .scoreboard td { padding: 9px 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,.05); }
  .scoreboard th { background: var(--panel-2); color: var(--muted); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; }
  .scoreboard tr:last-child td { border-bottom: none; }
  .scoreboard tr.highlight td { background: rgba(91, 224, 194, .08); color: var(--accent-2); }
  .scoreboard tr.highlight td b { color: var(--accent-2); }
  .tier-badge {
    display: inline-flex; flex-direction: column; align-items: center; justify-content: center;
    color: #0b1020; font-weight: 800; border-radius: 14px; padding: 18px 22px;
    box-shadow: 0 10px 30px rgba(0,0,0,.3), inset 0 0 0 2px rgba(255,255,255,.2);
    text-shadow: 0 1px 0 rgba(255,255,255,.25);
    min-width: 140px;
    background-size: 200% 200%;
    animation: tier-shimmer 6s ease infinite;
  }
  .tier-badge .tier-name { font-size: 20px; letter-spacing: .5px; text-transform: uppercase; }
  .tier-badge .tier-rating { font-size: 28px; margin-top: 2px; font-variant-numeric: tabular-nums; }
  @keyframes tier-shimmer { 0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
  .ranked-dashboard { text-align: left; margin-top: 20px; }
  .ranked-header { display: flex; gap: 20px; align-items: center; flex-wrap: wrap; justify-content: center; }
  .ranked-summary { flex: 1; min-width: 240px; }
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; }
  .stat-grid > div { background: var(--panel-2); padding: 10px 14px; border-radius: 10px; }
  .stat-grid span { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; }
  .stat-grid b { display: block; font-size: 18px; margin-top: 4px; font-variant-numeric: tabular-nums; }
  .next-tier { margin-top: 12px; font-size: 14px; color: var(--muted); }
  .improve-box { background: var(--panel-2); border-left: 3px solid var(--accent-2); padding: 12px 16px; border-radius: 8px; margin-top: 18px; font-size: 14px; }
  .improve-box ul { margin: 6px 0 0; padding-left: 20px; }
  .improve-box li { margin: 4px 0; line-height: 1.4; }
  .head-btn {
    background: var(--panel-2); color: var(--text); border: 1px solid rgba(255,255,255,.08);
    border-radius: 10px; padding: 6px 12px; font-size: 13px; cursor: pointer;
    font-family: inherit;
  }
  .head-btn:hover { background: #2a3470; }
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(5,8,18,.75); backdrop-filter: blur(6px);
    display: none; align-items: center; justify-content: center; z-index: 100;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--panel); border: 1px solid rgba(255,255,255,.08); border-radius: 16px;
    padding: 26px; max-width: 420px; width: 92%; box-shadow: var(--shadow);
  }
  .modal h3 { margin: 0 0 8px; }
  .modal p { color: var(--muted); font-size: 14px; margin: 0 0 14px; line-height: 1.5; }
  .modal input { width: 100%; font-size: 16px; padding: 12px 14px; }
  .modal .row { margin-top: 14px; }
  .submit-result { background: var(--panel-2); border-radius: 12px; padding: 14px; margin-top: 12px; font-size: 14px; }
  .submit-result.ok { border-left: 3px solid var(--good); }
  .submit-result.fail { border-left: 3px solid var(--bad); }
  .lb-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin: 12px 0 16px; }
  .lb-tab {
    background: var(--panel-2); border: 1px solid rgba(255,255,255,.06); color: var(--text);
    padding: 8px 14px; border-radius: 999px; cursor: pointer; font-size: 13px;
  }
  .lb-tab.active { background: var(--accent); color: #0b1020; border-color: var(--accent); font-weight: 600; }
  .lb-filters { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 14px; }
  .you-row td { background: rgba(124,156,255,.12) !important; color: var(--accent); }
  .you-row td b { color: var(--accent); }
  @media (max-width: 640px) {
    .head-btn { padding: 5px 8px; font-size: 11px; }
  }
  @media (max-width: 640px) {
    .choices { grid-template-columns: 1fr; }
    header { padding: 12px 14px; }
    main { padding: 14px; }
    .game { padding: 18px; }
    .stats { gap: 8px; }
    .stat { padding: 6px 10px; font-size: 12px; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="logo"></div>
    <div>Flagmaster <span style="color:var(--muted); font-weight:400; font-size:13px;">— learn every flag</span></div>
  </div>
  <div class="stats">
    <div class="stat">Score<b id="stat-score">0</b></div>
    <div class="stat">Streak<b id="stat-streak">0</b></div>
    <div class="stat">Best<b id="stat-best">0</b></div>
    <div class="stat">Seen<b id="stat-seen">0</b>/<span id="stat-pool">0</span></div>
    <div class="stat">Accuracy<b id="stat-acc">—</b></div>
    <button id="leaderboardBtn" class="head-btn">🏅 Leaderboard</button>
    <button id="userBtn" class="head-btn">👤 <span id="userLabel">Set name</span></button>
  </div>
</header>

<main>
  <div class="modes" id="modes"></div>

  <div class="controls">
    <label>Region</label>
    <select id="region">
      <option value="all">All countries</option>
      <option value="Africa">Africa</option>
      <option value="Americas">Americas</option>
      <option value="Asia">Asia</option>
      <option value="Europe">Europe</option>
      <option value="Oceania">Oceania</option>
    </select>
    <label>Difficulty</label>
    <select id="difficulty">
      <option value="all">All flags</option>
      <option value="easy">Easy (well-known)</option>
      <option value="medium">Medium</option>
      <option value="hard">Hard (obscure)</option>
    </select>
    <label>Length</label>
    <select id="length">
      <option value="10">10 questions</option>
      <option value="20" selected>20 questions</option>
      <option value="50">50 questions</option>
      <option value="0">All in pool</option>
    </select>
    <label>Choices</label>
    <select id="choiceCount">
      <option value="4" selected>4 options</option>
      <option value="5">5 options</option>
    </select>
    <label>Death timer</label>
    <select id="deathTimer">
      <option value="3">3s</option>
      <option value="4">4s</option>
      <option value="5" selected>5s</option>
      <option value="6">6s</option>
      <option value="7">7s</option>
      <option value="8">8s</option>
      <option value="9">9s</option>
      <option value="10">10s</option>
    </select>
    <button class="primary" id="startBtn">Start round</button>
    <button id="resetStats">Reset all stats</button>
  </div>

  <div class="game" id="game">
    <div class="progress-bar"><div id="progress"></div></div>
    <div id="content"></div>
  </div>

  <div class="footer-note">
    Flags via flagcdn.com · Progress saved locally · Keyboard: 1-5 to pick, Enter to continue · <a href="https://github.com" style="color:var(--muted);">Source</a>
  </div>
</main>

<div id="userModal" class="modal-backdrop" role="dialog" aria-modal="true">
  <div class="modal">
    <h3>Choose your handle</h3>
    <p>This shows on global leaderboards. 2-20 characters, letters/numbers/<code>_</code>/<code>-</code> only. You can change it anytime.</p>
    <input id="userInput" type="text" maxlength="20" autocomplete="off" spellcheck="false" placeholder="e.g. flagqueen99" />
    <div id="userError" class="feedback bad" style="text-align:left; min-height:0;"></div>
    <div class="row" style="justify-content:flex-end;">
      <button id="userCancel">Cancel</button>
      <button id="userSave" class="primary">Save</button>
    </div>
  </div>
</div>

/* ---------------- RANKED TIERS & RATING ---------------- */
const TIERS = [
  { name: "Iron",        min: 0,   color: "#7a6f63", gradient: "linear-gradient(135deg,#6b5e52,#3b332c)" },
  { name: "Bronze",      min: 200, color: "#cd7f32", gradient: "linear-gradient(135deg,#e69547,#8b5a23)" },
  { name: "Silver",      min: 350, color: "#c0c0c0", gradient: "linear-gradient(135deg,#e0e0e0,#888)" },
  { name: "Gold",        min: 500, color: "#ffd700", gradient: "linear-gradient(135deg,#ffe566,#c79a00)" },
  { name: "Platinum",    min: 650, color: "#5be0c2", gradient: "linear-gradient(135deg,#7eecd1,#2f9d83)" },
  { name: "Diamond",     min: 750, color: "#7c9cff", gradient: "linear-gradient(135deg,#a4baff,#4a6ee0)" },
  { name: "Master",      min: 850, color: "#c084fc", gradient: "linear-gradient(135deg,#dfb4ff,#8a3fc7)" },
  { name: "Grandmaster", min: 925, color: "#f87171", gradient: "linear-gradient(135deg,#ffa3a3,#c43c3c)" },
  { name: "Challenger",  min: 975, color: "#fde68a", gradient: "linear-gradient(135deg,#fef3c7 0%,#f59e0b 35%,#ef4444 70%,#8b5cf6 100%)" }
];
function rateAnswer(correct, timeMs) {
  if (!correct) return 0;
  if (timeMs <= 1000) return 1000;
  if (timeMs <= 3000) return Math.round(1000 - ((timeMs - 1000) / 2000) * 300);
  if (timeMs <= 8000) return Math.round(700 - ((timeMs - 3000) / 5000) * 400);
  if (timeMs <= 15000) return Math.round(Math.max(100, 300 - ((timeMs - 8000) / 7000) * 200));
  return 100;
}
function getTier(rating) {
  if (rating == null) return null;
  for (let i = TIERS.length - 1; i >= 0; i--) if (rating >= TIERS[i].min) return TIERS[i];
  return TIERS[0];
}
function calcRanking(perFlag) {
  const entries = Object.entries(perFlag);
  if (!entries.length) return null;
  let sum = 0, right = 0, totalTime = 0, correctTime = 0;
  for (const [code, info] of entries) {
    sum += rateAnswer(info.correct, info.time);
    if (info.correct) { right++; correctTime += info.time; }
    totalTime += info.time;
  }
  const rating = Math.round(sum / entries.length);
  return {
    rating, tier: getTier(rating),
    accuracy: right / entries.length,
    avgTime: totalTime / entries.length,
    avgCorrectTime: right ? correctTime / right : 0,
    total: entries.length, right, wrong: entries.length - right
  };
}
function regionBreakdown(perFlag) {
  const out = {};
  for (const [code, info] of Object.entries(perFlag)) {
    const c = COUNTRIES.find(x => x[0] === code); if (!c) continue;
    const r = c[2];
    out[r] = out[r] || { total: 0, right: 0, sumTime: 0 };
    out[r].total++;
    if (info.correct) out[r].right++;
    out[r].sumTime += info.time;
  }
  return out;
}
function fmtTime(ms) {
  if (ms == null) return "—";
  if (ms < 10000) return (ms/1000).toFixed(2) + "s";
  return (ms/1000).toFixed(1) + "s";
}
function fmtTotal(ms) {
  if (ms == null) return "—";
  const totalS = ms / 1000;
  const m = Math.floor(totalS / 60);
  const s = (totalS - m*60);
  return m > 0 ? `${m}m ${s.toFixed(1)}s` : `${s.toFixed(2)}s`;
}
function nameByCode(code) { const c = COUNTRIES.find(x => x[0] === code); return c ? c[1] : code; }

/* ---------------- UTIL ---------------- */
function normalize(s) {
  return (s || "").toLowerCase()
    .normalize("NFD").replace(/[̀-ͯ]/g, "")
    .replace(/[^a-z ]/g, "").trim();
}
function isCorrectName(input, country) {
  const n = normalize(input);
  if (!n) return false;
  if (n === normalize(country.name)) return true;
  const alts = ALT_NAMES[country.name] || [];
  return alts.some(a => normalize(a) === n);
}
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function pickRandom(arr, n, exclude) {
  const pool = arr.filter(c => !exclude || c.code !== exclude.code);
  return shuffle(pool).slice(0, n);
}
function buildPool() {
  const region = document.getElementById("region").value;
  const diff = document.getElementById("difficulty").value;
  let p = COUNTRIES.map(([code,name,reg,d]) => ({ code, name, region: reg, difficulty: d }));
  if (region !== "all") p = p.filter(c => c.region === region);
  if (diff !== "all") {
    const map = { easy: 1, medium: 2, hard: 3 };
    p = p.filter(c => c.difficulty === map[diff]);
  }
  return p;
}

/* ---------------- ROUND FLOW ---------------- */
function startRound() {
  pool = buildPool();
  if (pool.length === 0) {
    content.innerHTML = `<p class="muted" style="text-align:center;">No flags match those filters.</p>`;
    return;
  }
  roundLength = parseInt($("length").value, 10) || pool.length;
  if (roundLength === 0 || mode === "marathon" || mode === "flashcard" || mode === "death") roundLength = pool.length;

  queue = shuffle(pool).slice(0, roundLength);
  roundIndex = 0;
  roundScore = 0;
  roundStreak = 0;
  roundRight = 0;
  roundWrong = 0;
  missed = [];
  deathStreak = 0;
  if (mode === "death") {
    deathRunSettings = {
      timer: parseInt($("deathTimer").value, 10) || 5,
      region: $("region").value,
      difficulty: $("difficulty").value,
      choices: getChoiceCount()
    };
  } else {
    deathRunSettings = null;
  }
  awaitingNext = false;
  setProgress(0);
  updateStats();
  nextQuestion();
}

function nextQuestion() {
  stopTimer();
  stopLiveTicker();
  if (roundIndex >= queue.length) return endRound();
  current = queue[roundIndex];
  setProgress((roundIndex / queue.length) * 100);
  if (mode === "multipleChoice") renderMultipleChoice();
  else if (mode === "type")       renderType();
  else if (mode === "reverse")    renderReverse();
  else if (mode === "timed")      renderTimed();
  else if (mode === "flashcard")  renderFlashcard();
  else if (mode === "marathon")   renderMultipleChoice();
  else if (mode === "death")      renderDeath();
  else if (mode === "ranked")     renderRanked();
  else if (mode === "timeattack") renderTimeAttack();
  else if (mode === "daily")      renderDaily();
  updateStats();
}

function recordAnswer(correct, country, speedBonus=0) {
  const key = country.code;
  state.seen[key] = state.seen[key] || { right: 0, wrong: 0 };
  if (correct) {
    state.seen[key].right++;
    state.totalRight++;
    roundRight++;
    roundStreak++;
    roundScore += 10 + Math.min(roundStreak, 10) + speedBonus;
  } else {
    state.seen[key].wrong++;
    state.totalWrong++;
    roundWrong++;
    roundStreak = 0;
    missed.push(country);
  }
  if (roundScore > state.best) state.best = roundScore;
  saveState();
  updateStats();
}

function endRound() {
  setProgress(100);
  stopTimer();
  const total = roundRight + roundWrong;
  const acc = total ? Math.round(100 * roundRight / total) : 0;
  if (mode === "death") recordDeathRun();
  if (mode === "ranked") return endRankedRound();
  if (mode === "timeattack") return endTimeAttackRound();
  if (mode === "daily") return endDailyRound();

  let missedHTML = "";
  if (missed.length) {
    missedHTML = `
      <h3 style="margin-top:24px;">Missed (${missed.length}) — review these:</h3>
      <div class="missed-list">
        ${missed.map(c => `
          <div class="missed"><img src="https://flagcdn.com/w160/${c.code}.png" alt="${c.name}"><span>${c.name}</span></div>
        `).join("")}
      </div>`;
  }
  const isDeath = mode === "death";
  content.innerHTML = `
    <div class="end-screen">
      <h2>${isDeath ? "☠ You died" : "Round complete"}</h2>
      <div class="big-score">${isDeath ? deathStreak : roundScore}</div>
      <div class="muted">${isDeath ? `Survived ${deathStreak} flag${deathStreak===1?"":"s"} · Score ${roundScore}` : `${roundRight} right · ${roundWrong} wrong · ${acc}% accuracy`}</div>
      ${isDeath ? `<div id="deathSubmit"></div>` : ""}
      <div class="row" style="margin-top:18px;">
        <button class="primary" id="again">Play again</button>
        ${missed.length ? '<button id="reviewMissed">Drill missed flags</button>' : ''}
      </div>
      ${missedHTML}
      ${isDeath ? renderDeathScoreboard() : ""}
    </div>
  `;
  if (isDeath) wireDeathScoreboardClear();
  $("again").onclick = () => startRound();
  if (isDeath && deathStreak > 0) submitDeathScore();
  const rm = $("reviewMissed");
  if (rm) rm.onclick = () => {
    pool = missed.slice();
    queue = shuffle(pool);
    roundLength = queue.length;
    roundIndex = 0; roundScore = 0; roundStreak = 0; roundRight = 0; roundWrong = 0;
    missed = [];
    setProgress(0);
    nextQuestion();
  };
}

/* ---------------- RANKED / TIME ATTACK END ROUND ---------------- */
function endRankedRound() {
  const ranking = calcRanking(rankedTimings);
  if (!ranking) return;
  const placement = {
    date: Date.now(),
    perFlag: rankedTimings,
    accuracy: ranking.accuracy,
    avgTime: ranking.avgTime,
    avgCorrectTime: ranking.avgCorrectTime,
    rating: ranking.rating,
    tier: ranking.tier,
    right: ranking.right,
    wrong: ranking.wrong,
    total: ranking.total
  };
  state.ranked = state.ranked || { history: [] };
  state.ranked.history = state.ranked.history || [];
  const prevRating = state.ranked.rating;
  state.ranked.placement = placement;
  state.ranked.placementDone = true;
  state.ranked.rating = ranking.rating;
  state.ranked.tier = ranking.tier ? ranking.tier.name : null;
  state.ranked.history.push({
    date: placement.date,
    rating: ranking.rating,
    tier: ranking.tier ? ranking.tier.name : null,
    accuracy: ranking.accuracy,
    avgTime: ranking.avgTime
  });
  saveState();

  let deltaHTML = "";
  if (prevRating != null) {
    const d = ranking.rating - prevRating;
    deltaHTML = `<div class="muted" style="margin-top:6px;">${d >= 0 ? "▲" : "▼"} ${d >= 0 ? "+" : ""}${d} from last placement (${prevRating})</div>`;

function getChoiceCount() {

function renderMultipleChoice() {
  const n = getChoiceCount();
  const distractors = pickRandom(COUNTRIES.map(([c,n,r,d]) => ({code:c,name:n,region:r,difficulty:d})), n - 1, current);
  const options = shuffle([current, ...distractors]);
  content.innerHTML = `
    <div class="flag-wrap">${flagImg(current.code, "Flag")}</div>
    <div class="prompt">Which country flies this flag? <span class="badge">${roundIndex+1}/${queue.length}</span></div>

      </div>
      <div class="row"><button id="dontKnowBtn">I don't know</button></div>
      <div class="feedback" id="fb"></div>
    </div>
  `;
  bindChoices(options);
  $("dontKnowBtn").onclick = handleDontKnow;
}
function bindChoices(options) {
  const choices = content.querySelectorAll(".choice");
  choices.forEach(btn => {
    btn.addEventListener("click", () => handleChoice(btn, options));
  });
}
function handleDontKnow() {
  if (awaitingNext) return;
  awaitingNext = true;
  stopTimer();
  recordAnswer(false, current);
  content.querySelectorAll(".choice").forEach(b => {
    b.classList.add("disabled");
    if (b.dataset.code === current.code) b.classList.add("correct");
  });
  const dk = $("dontKnowBtn"); if (dk) dk.disabled = true;
  $("fb").innerHTML = `<span class="bad">Answer: <b>${current.name}</b> <button id="nxt" class="primary" style="margin-left:8px;">Next →</button></span>`;
  $("nxt").focus();
  $("nxt").onclick = advance;
}
function handleChoice(btn, options) {
  if (awaitingNext) return;
  awaitingNext = true;
  const code = btn.dataset.code;
  const correct = code === current.code;
  recordAnswer(correct, current);
  content.querySelectorAll(".choice").forEach(b => {
    b.classList.add("disabled");
    if (b.dataset.code === current.code) b.classList.add("correct");
    else if (b === btn && !correct) b.classList.add("wrong");
  });
  const fb = $("fb");
  fb.innerHTML = correct
    ? `<span class="good">Correct! <button id="nxt" class="primary" style="margin-left:8px;">Next →</button></span>`
    : `<span class="bad">Answer: <b>${current.name}</b> <button id="nxt" class="primary" style="margin-left:8px;">Next →</button></span>`;
  $("nxt").focus();
  $("nxt").onclick = advance;
}

function handleTimedChoice(btn, options) {

const USER_KEY = "flagmaster.username";
function getUsername() { try { return localStorage.getItem(USER_KEY) || ""; } catch { return ""; } }
function setUsername(name) {
  try { localStorage.setItem(USER_KEY, name); } catch {}
  refreshUserLabel();
}
function refreshUserLabel() {
  const el = document.getElementById("userLabel");
  const name = getUsername();
  if (el) el.textContent = name ? "@" + name : "Set name";
}
function validUsername(s) {
  if (typeof s !== "string") return false;
  const n = s.trim();
  return /^[A-Za-z0-9_\-]{2,20}$/.test(n);
}
function openUserModal(onSave) {
  const modal = document.getElementById("userModal");
  const input = document.getElementById("userInput");
  const err = document.getElementById("userError");
  err.textContent = "";
  input.value = getUsername();
  modal.classList.add("open");
  setTimeout(() => input.focus(), 30);
  function close() {
    modal.classList.remove("open");
    document.getElementById("userSave").onclick = null;
    document.getElementById("userCancel").onclick = null;
    input.onkeydown = null;
  }
  function save() {
    const v = input.value.trim();
    if (!validUsername(v)) { err.textContent = "2-20 characters, letters/numbers/underscore/dash only."; return; }
    setUsername(v);
    close();
    if (onSave) onSave(v);
  }
  document.getElementById("userSave").onclick = save;
  document.getElementById("userCancel").onclick = close;
  input.onkeydown = (e) => { if (e.key === "Enter") save(); if (e.key === "Escape") close(); };
}

async function apiSubmit(mode, board, score, meta) {
  const username = getUsername();
  if (!username) return { error: "no_username" };
  try {
    const r = await fetch("/api/leaderboard", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ mode, board, score, username, meta })
    });
    if (!r.ok) return { error: "http_" + r.status, status: r.status, body: await safeText(r) };
    return await r.json();
  } catch (e) { return { error: "network", detail: String(e) }; }
}
async function apiFetch(mode, board, limit = 50) {
  try {
    const r = await fetch(`/api/leaderboard?mode=${encodeURIComponent(mode)}&board=${encodeURIComponent(board || "global")}&limit=${limit}`);
    if (!r.ok) return { error: "http_" + r.status };
    return await r.json();
  } catch (e) { return { error: "network" }; }
}
async function safeText(r) { try { return await r.text(); } catch { return ""; } }

function recordDeathRun() {

    timer: deathRunSettings ? deathRunSettings.timer : null,

    difficulty: deathRunSettings ? deathRunSettings.difficulty : "all",
    choices: deathRunSettings ? deathRunSettings.choices : 4,
    date: Date.now()
  };
  lastDeathRunDate = run.date;
  state.deathScores.push(run);
  // Sort by survived desc, then earliest date (older record wins ties)
  state.deathScores.sort((a, b) => (b.survived - a.survived) || (a.date - b.date));

  state.deathScores = state.deathScores.slice(0, 50);
  saveState();
}

function renderRankedDashboard(placement) {
  const tier = placement.tier || getTier(placement.rating);
  const region = regionBreakdown(placement.perFlag);
  const wrongList = Object.entries(placement.perFlag).filter(([c,i]) => !i.correct).map(([c,i]) => ({code:c, ...i}));
  const correctList = Object.entries(placement.perFlag).filter(([c,i]) => i.correct).map(([c,i]) => ({code:c, ...i}));
  correctList.sort((a,b) => b.time - a.time);
  const slowest = correctList.slice(0, 10);
  const fastest = correctList.slice().sort((a,b) => a.time - b.time).slice(0, 5);

  // Weakest region (lowest accuracy, tiebreak slowest)
  let weakest = null;
  for (const [r, stats] of Object.entries(region)) {
    const acc = stats.right / stats.total;
    const avg = stats.sumTime / stats.total;
    if (!weakest || acc < weakest.acc || (acc === weakest.acc && avg > weakest.avg)) {
      weakest = { region: r, acc, avg };
    }
  }

  const tipParts = [];
  if (placement.accuracy < 0.85) tipParts.push(`Accuracy is the fastest way to climb — relearn the <b>${wrongList.length}</b> flag${wrongList.length===1?"":"s"} you missed.`);
  if (placement.avgCorrectTime > 3000) tipParts.push(`Drill your <b>slowest</b> correct answers to push average response time down.`);
  if (placement.avgCorrectTime <= 1500 && placement.accuracy >= 0.95) tipParts.push(`You're already sharp — try increasing choice count to 5 to keep climbing.`);
  if (weakest) tipParts.push(`Weakest region: <b>${weakest.region}</b> (${Math.round(weakest.acc*100)}% acc, ${fmtTime(weakest.avg)} avg).`);

  const nextTier = TIERS.find(t => t.min > placement.rating);
  const pointsToNext = nextTier ? nextTier.min - placement.rating : 0;

  return `
    <div class="ranked-dashboard">
      <div class="ranked-header">
        ${tierBadgeHTML(tier, placement.rating, "padding: 22px 28px;")}
        <div class="ranked-summary">
          <div class="stat-grid">
            <div><span class="muted">Accuracy</span><b>${Math.round(placement.accuracy*100)}%</b></div>
            <div><span class="muted">Avg time</span><b>${fmtTime(placement.avgTime)}</b></div>
            <div><span class="muted">Avg (correct)</span><b>${fmtTime(placement.avgCorrectTime)}</b></div>
            <div><span class="muted">Correct</span><b>${placement.right}/${placement.total}</b></div>
          </div>
          ${nextTier ? `<div class="next-tier">Next: <b style="color:${nextTier.color}">${nextTier.name}</b> — <b>${pointsToNext}</b> rating to go</div>` : `<div class="next-tier">You're at the top of the ladder. Maintain by re-placing.</div>`}
          <div class="muted" style="font-size:12px; margin-top:6px;">Placed ${formatDate(placement.date)}</div>
        </div>
      </div>

      ${tipParts.length ? `<div class="improve-box"><b>How to improve:</b><ul>${tipParts.map(t => `<li>${t}</li>`).join("")}</ul></div>` : ""}

      <h3 style="margin-top:22px;">By region</h3>
      <div class="scoreboard">
        <table>
          <thead><tr><th>Region</th><th>Accuracy</th><th>Avg time</th><th>Right / total</th></tr></thead>
          <tbody>
            ${Object.entries(region).map(([r, s]) => `
              <tr>
                <td>${r}</td>
                <td>${Math.round(s.right/s.total*100)}%</td>
                <td>${fmtTime(s.sumTime/s.total)}</td>
                <td>${s.right}/${s.total}</td>
              </tr>`).join("")}
          </tbody>
        </table>

function todayUTC() {
  const d = new Date();
  const y = d.getUTCFullYear(), m = d.getUTCMonth() + 1, day = d.getUTCDate();
  return `${y}-${m<10?"0":""}${m}-${day<10?"0":""}${day}`;
}
function hashString(s) {
  let h = 2166136261;
  for (let i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = Math.imul(h, 16777619); }
  return h >>> 0;
}
function mulberry32(seed) {
  return function() {
    let t = seed += 0x6D2B79F5;
    t = Math.imul(t ^ t >>> 15, t | 1);
    t ^= t + Math.imul(t ^ t >>> 7, t | 61);
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function getDailyFlags(dateStr) {
  // Deterministic for everyone on the same UTC date
  const rng = mulberry32(hashString("flagmaster-daily-" + dateStr));
  const all = COUNTRIES.map(([code, name, region, d]) => ({ code, name, region, difficulty: d }));
  // Fisher-Yates with seeded RNG
  for (let i = all.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [all[i], all[j]] = [all[j], all[i]];
  }
  return all.slice(0, DAILY_COUNT);
}

function startTimer(ms, onTimeout) {
  stopTimer(); // safety: kill any stray timer before starting a new one
  timerStart = Date.now();
  timerDuration = ms;
  const bar = $("tbar");
  const text = $("ttext");
  if (bar) bar.style.width = "100%";
  if (text) text.textContent = (ms/1000).toFixed(1) + "s";
  const myStart = timerStart; // capture so a later startTimer that overwrites the global cannot affect this loop
  function tick() {
    // Bail if a newer timer took over
    if (timerStart !== myStart) return;
    const elapsed = Date.now() - myStart;
    const pct = Math.max(0, 100 - (elapsed / ms) * 100);
    if (bar) bar.style.width = pct + "%";
    if (text) {
      const remaining = Math.max(0, ms - elapsed) / 1000;
      text.textContent = remaining.toFixed(1) + "s";
    }
    if (elapsed >= ms) { stopTimer(); onTimeout(); return; }
    timerHandle = requestAnimationFrame(tick);
  }
  tick();
}
function stopTimer() {
  if (timerHandle) cancelAnimationFrame(timerHandle);
  timerHandle = null;
}

/* Live ticker for time-attack current-question time */
let liveTickerHandle = null;
function startLiveTicker(elementId, startTs) {
  stopLiveTicker();
  function tick() {
    const el = document.getElementById(elementId);
    if (!el) { liveTickerHandle = requestAnimationFrame(tick); return; }
    const t = (Date.now() - startTs) / 1000;
    el.textContent = t.toFixed(2) + "s";
    liveTickerHandle = requestAnimationFrame(tick);
  }
  tick();
}
function stopLiveTicker() {
  if (liveTickerHandle) cancelAnimationFrame(liveTickerHandle);
  liveTickerHandle = null;
}

  `;
  $("revealBtn").onclick = () => {
    cardRevealed = true;
    $("reveal").innerHTML = `${current.name}<small>${current.region}</small>`;
    $("cardActions").style.display = "flex";
  };
  $("knewIt").onclick = () => { recordAnswer(true, current); advance(); };
  $("missedIt").onclick = () => { recordAnswer(false, current); advance(); };
}

/* ---------------- ADVANCE ---------------- */
function advance() {
  awaitingNext = false;
  roundIndex++;
  nextQuestion();
}

/* ---------------- KEYBOARD ---------------- */
document.addEventListener("keydown", (e) => {
  const tag = (e.target.tagName || "").toLowerCase();
  const inField = tag === "input" || tag === "textarea" || tag === "select";

  if (e.key === "Enter" && awaitingNext) {
    const nxt = $("nxt");
    if (nxt) { e.preventDefault(); nxt.click(); return; }
  }
  if (e.key === " " && mode === "flashcard" && !cardRevealed) {
    const rb = $("revealBtn"); if (rb) { e.preventDefault(); rb.click(); }
  }
  if (!inField && /^[1-5]$/.test(e.key)) {
    const btns = content.querySelectorAll(".choice");
    const i = parseInt(e.key, 10) - 1;
    if (btns[i] && !awaitingNext) btns[i].click();
  }
});

/* ---------------- WIRE UP ---------------- */
document.getElementById("startBtn").addEventListener("click", () => {
  if (mode === "death") showDeathIntro();
  else if (mode === "ranked") showRankedIntro();
  else if (mode === "timeattack") showTimeAttackIntro();
  else if (mode === "daily") showDailyIntro();
  else startRound();
});
document.getElementById("region").addEventListener("change", () => updateStats());
document.getElementById("difficulty").addEventListener("change", () => updateStats());
document.getElementById("resetStats").addEventListener("click", () => {
  if (!confirm("Reset all scores, history, best score, and death scoreboard?")) return;
  state = freshState();
  lastDeathRunDate = null;
  saveState();
  updateStats();
});

document.getElementById("userBtn").addEventListener("click", () => openUserModal());
document.getElementById("leaderboardBtn").addEventListener("click", () => showLeaderboardView());
refreshUserLabel();

renderModes();
pool = buildPool();
updateStats();
content.innerHTML = `
  <div class="end-screen">
    <h2>Ready to learn every flag?</h2>
    <p class="muted">Pick a mode above. Choose a region or difficulty if you want to focus. Then hit <b>Start round</b>.</p>
    <div class="row" style="margin-top:14px;">
      <button class="primary" onclick="document.getElementById('startBtn').click()">Start round</button>
    </div>
    <p class="muted" style="margin-top:18px; font-size:13px;">${COUNTRIES.length} countries · 5 regions · 6 modes</p>
  </div>
`;
</script>
</body>
</html>
